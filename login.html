<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Form</title>

<!-- ICON LIBRARY -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.login-container {
    background: white;
    padding: 30px;
    width: 300px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    text-align: center;
}

h2 {
    margin-bottom: 20px;
    color: #333;
}

/* INPUT GROUP */
.input-group {
    display: flex;
    align-items: center;
    background: #f1f1f1;
    margin-bottom: 15px;
    padding: 10px;
    border-radius: 5px;
}

.input-group i {
    margin-right: 10px;
    color: #555;
}

.input-group input {
    border: none;
    outline: none;
    background: transparent;
    width: 100%;
    font-size: 14px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 5px;
    background: #667eea;
    color: white;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 10px;
}

button:hover {
    opacity: 0.9;
}

</style>

</head>

<body>

<div class="login-container">
    <h2>🔐 Login</h2>

    <form>
        <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
